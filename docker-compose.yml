services:
  backend:
    build:
      context: .
      target: backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./medbios.db
    volumes:
      - ./backend/uploads:/app/backend/uploads
      - db-data:/app/backend
    restart: unless-stopped

  frontend:
    build:
      context: .
      target: production
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db-data:
