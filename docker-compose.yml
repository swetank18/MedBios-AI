version: '3.9'

services:
  backend:
    build: ./backend
    container_name: medbios-backend
    env_file: .env
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/medbios.db
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-me-in-production}
      - MEDBIOS_ENCRYPTION_KEY=${MEDBIOS_ENCRYPTION_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    container_name: medbios-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
